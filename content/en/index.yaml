about:
  title: About Me
  image: 
    src: "/images/profile-picture.jpg"
    alt: Picture of me with a dog
  description: |
    Hi! I’m a Frontend Developer based in Taipei, Taiwan. I've immersed myself in the Vue ecosystem since 2023.
    I’m the person you call when you need to turn a complex Figma file into a snappy, functional Nuxt app that doesn't just look good but actually feels 'right' to use.
    
    I’m a big believer in clean code, but I care even more about the person using it. 
    Whether it's optimizing hydration cycles or just picking the perfect transition, I’m all about those small details that make a digital experience feel premium.
experience:
  title: Experience
  items:
    - position: Frontend Developer
      company: 
        name: Global Payments Taiwan
        url: https://www.globalpayments.com/
      date: "Sep 2025 - Mar 2026"
      description: |
        Led system migration and integration following the acquisition of EftPay.
      detail: |
        My role involved implementing a standardized UI component library to maintain brand consistency across the newly integrated fintech products.

        A key achievement was the implementation of a new Multi-Factor Authentication (MFA) security layer. I engineered the authentication flow to balance high-level security compliance with a frictionless user experience, utilizing modern web standards to protect sensitive financial data.  
    - position: Frontend Developer
      company: 
        name: EftPay (Asia) Limited
        url: https://www.eftpay.com.hk/en/home/
      date: "Apr 2023 - Aug 2025"
      description: |
        Engineered and maintained a robust Enterprise Resource Planning (ERP) system tailored for large-scale payment management.
      detail: |
        I specialized in data visualization, building interactive dashboards that transformed complex transaction logs into actionable merchant insights.
        
        Additionally, I managed the integration of multiple third-party payment provider APIs, significantly reducing merchant onboarding time.
